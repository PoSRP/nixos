general {
    hide_cursor = true
}

background {
    monitor =
    path = $HOME/.cache/hyprlock-bg
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.5)
    outer_color = rgba(150, 150, 150, 0.5)
    font_color = rgb(220, 220, 220)
    placeholder_text = <i>Password</i>
    fade_on_empty = true
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(220, 220, 220, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
